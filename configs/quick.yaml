# Quick training configuration - for testing/debugging
# Uses smaller model and fewer epochs for fast validation

model:
  model_name: "yolov8n"  # Nano model for speed
  num_classes: 43
  pretrained: true

train:
  epochs: 10  # Quick training
  batch_size: 32  # Larger batch for speed
  imgsz: 416  # Smaller image size
  device: "cuda"
  workers: 2
  patience: 5  # Shorter patience
  
  optimizer: "SGD"
  momentum: 0.937
  weight_decay: 0.0005
  lr0: 0.01
  lrf: 0.1
  warmup_epochs: 1.0
  warmup_momentum: 0.8
  
  seed: 42
  save_period: 5
  
  val_split: 0.1
  test_split: 0.1
  
  augment: false  # Disable augmentation for speed
  mosaic: 0.0
  mixup: 0.0

data:
  data_dir: "./data"
  train_dir: "train"
  val_dir: "val"
  test_dir: "test"
  format: "coco"
  cache: true
  shuffle: true

output_dir: "./outputs"
weights_dir: "./outputs/weights"
logs_dir: "./outputs/logs"
