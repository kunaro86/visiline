# YOLO Traffic Sign Recognition Configuration
# Default configuration for training and evaluation

# Model Configuration
model:
  model_name: "yolov8n"  # yolov8n, yolov8s, yolov8m, yolov8l, yolov8x
  num_classes: 43  # Number of traffic sign classes (GTSRB)
  pretrained: true  # Use pretrained weights
  task: "detect"  # Detection task

# Training Configuration
train:
  epochs: 100  # Number of training epochs
  batch_size: 16  # Batch size
  imgsz: 640  # Input image size
  device: "cuda"  # cuda or cpu
  workers: 4  # Number of data loading workers
  patience: 20  # EarlyStopping patience
  
  # Optimizer settings
  optimizer: "SGD"  # SGD, Adam, etc.
  momentum: 0.937
  weight_decay: 0.0005
  lr0: 0.01  # Initial learning rate
  lrf: 0.1  # Final learning rate (lr0 * lrf)
  warmup_epochs: 3.0
  warmup_momentum: 0.8
  
  seed: 42  # Random seed for reproducibility
  save_period: 10  # Save checkpoint every n epochs
  
  # Data split
  val_split: 0.1
  test_split: 0.1
  
  # Augmentation settings
  augment: true
  mosaic: 1.0
  mixup: 0.0
  hsv_h: 0.015  # HSV-Hue augmentation
  hsv_s: 0.7  # HSV-Saturation augmentation
  hsv_v: 0.4  # HSV-Value augmentation
  degrees: 10.0  # Rotation
  translate: 0.1  # Translation
  scale: 0.5  # Scaling
  flipud: 0.0  # Vertical flip
  fliplr: 0.5  # Horizontal flip probability

# Data Configuration
data:
  data_dir: "./data"  # Root data directory
  train_dir: "train"  # Training data subdirectory
  val_dir: "val"  # Validation data subdirectory
  test_dir: "test"  # Test data subdirectory
  format: "coco"  # Dataset format
  cache: true  # Cache images in memory
  shuffle: true  # Shuffle data

# Output directories
output_dir: "./outputs"
weights_dir: "./outputs/weights"
logs_dir: "./outputs/logs"
