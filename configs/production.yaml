# High-performance configuration for production training
# Uses larger model with comprehensive augmentation

model:
  model_name: "yolov8m"  # Medium model for better accuracy
  num_classes: 43
  pretrained: true

train:
  epochs: 300  # Extended training
  batch_size: 16  # Standard batch size
  imgsz: 640  # Full resolution
  device: "cuda"
  workers: 8  # More workers for data loading
  patience: 50  # Longer patience
  
  optimizer: "SGD"
  momentum: 0.937
  weight_decay: 0.0005
  lr0: 0.01
  lrf: 0.1
  warmup_epochs: 5.0
  warmup_momentum: 0.8
  
  seed: 42
  save_period: 20
  
  val_split: 0.1
  test_split: 0.1
  
  augment: true  # Full augmentation
  mosaic: 1.0
  mixup: 0.1
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 15.0
  translate: 0.15
  scale: 0.5
  flipud: 0.0
  fliplr: 0.5

data:
  data_dir: "./dataset"
  train_dir: "train"
  val_dir: "val"
  test_dir: "test"
  format: "coco"
  cache: true
  shuffle: true

output_dir: "./outputs"
weights_dir: "./outputs/weights"
logs_dir: "./outputs/logs"
